<div class="courses-container">
    <h2>Керування курсами</h2>

    <form class="add-course-form" [formGroup]="courseForm" (ngSubmit)="onAddCourse()">
        <h3>Додати новий курс</h3>
        <div class="form-inputs">
            <input type="text" formControlName="title" placeholder="Назва курсу">
            <input type="text" formControlName="category" placeholder="Категорія">
            <input type="text" formControlName="duration" placeholder="Тривалість (напр. 5 годин)">
        </div>
        <button type="submit" [disabled]="courseForm.invalid">Додати курс</button>
    </form>

    <hr class="divider">

    <input type="text" [formControl]="searchControl" placeholder="Пошук курсів за назвою...">

    <ul *ngIf="courses$ | async as courses">
        <li *ngFor="let course of courses">
            <div class="course-info">
                <strong>{{ course.title }}</strong>
                <span>{{ course.category }}</span>
            </div>
            <div class="course-actions">
                <small>⏱ {{ course.duration }}</small>
                <button class="delete-btn" (click)="onDeleteCourse(course.id)" title="Видалити курс">❌</button>
            </div>
        </li>
    </ul>
</div>
